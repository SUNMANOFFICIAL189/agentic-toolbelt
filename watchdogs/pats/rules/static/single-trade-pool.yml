rules:
  - id: pats-copy-executor-receiving-signal-bot
    languages: [typescript]
    severity: ERROR
    message: |
      `copyExecutor.hydrateOpenTrades(...)` is being called with rows that
      may include signal-bot trades. signal-bot trades are owned by
      signalExecutor ONLY — duplicating them in copyExecutor causes
      lifecycle close paths to misattribute the close, leaving
      signalExecutor.recentlyClosedMarkets cooldown unset. The next signal
      on the same market re-opens it within the 15-min cooldown window,
      creating a duplicate Supabase "open" row.

      Calibrated against 2026-05-07 fix c0e44b9. Always filter:
        const copyOnly = openRows.filter(r => r.leader_wallet !== 'signal-bot');
        copyExecutor.hydrateOpenTrades(copyOnly);
    paths:
      include:
        - "runner.ts"
        - "copy-executor.ts"
    pattern-either:
      # Direct pass of unfiltered openRows / data / rows
      - patterns:
          - pattern: $E.copyExecutor.hydrateOpenTrades($ROWS)
          - pattern-not: $E.copyExecutor.hydrateOpenTrades($ROWS.filter(...))
          # Simple form: filter is just the signal-bot check
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $R.leader_wallet !== 'signal-bot');
              ...
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $R.leader_wallet !== "signal-bot");
              ...
          # Compound form: signal-bot check is one of multiple && conditions
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $X && $R.leader_wallet !== 'signal-bot');
              ...
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $X && $R.leader_wallet !== "signal-bot");
              ...
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $R.leader_wallet !== 'signal-bot' && $X);
              ...
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $R.leader_wallet !== "signal-bot" && $X);
              ...
      # Same shape but called on `this.copyExecutor`
      - patterns:
          - pattern: this.copyExecutor.hydrateOpenTrades($ROWS)
          - pattern-not: this.copyExecutor.hydrateOpenTrades($ROWS.filter(...))
          # Simple form: filter is just the signal-bot check
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $R.leader_wallet !== 'signal-bot');
              ...
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $R.leader_wallet !== "signal-bot");
              ...
          # Compound form: signal-bot check is one of multiple && conditions
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $X && $R.leader_wallet !== 'signal-bot');
              ...
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $X && $R.leader_wallet !== "signal-bot");
              ...
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $R.leader_wallet !== 'signal-bot' && $X);
              ...
          - pattern-not-inside: |
              const $ROWS = $SRC.filter($R => $R.leader_wallet !== "signal-bot" && $X);
              ...
          # Two-step / chained form: a signal-bot filter exists somewhere in
          # the enclosing scope. This is more permissive than tracking the
          # exact variable chain, but in practice if a programmer wrote a
          # signal-bot filter AND a hydrateOpenTrades call in the same scope,
          # they almost certainly chained them. Use when the simple pattern
          # doesn't match the explicit-chain refactor (Branch 3 shape:
          # nonSignalRows = openRows.filter(...!== signal-bot);
          # copyRows = nonSignalRows.filter(...pipeline...);
          # this.copyExecutor.hydrateOpenTrades(copyRows);)
          - pattern-not-inside: |
              $SRC.filter($R => $R.leader_wallet !== 'signal-bot');
              ...
          - pattern-not-inside: |
              $SRC.filter($R => $R.leader_wallet !== "signal-bot");
              ...
    metadata:
      category: correctness
      pattern-source: "git show c0e44b9 -- src/core/runner.ts"
